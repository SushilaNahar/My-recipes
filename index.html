<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Cookbook</title>
  <meta name="theme-color" content="#F7F2E7" />

  <!-- Apply saved theme before paint to avoid a flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('cookbook-theme');
        if (!t) t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.js"></script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap');

    :root {
      --parchment: #F7F2E7;   /* page background */
      --surface:   #ffffff;   /* cards, inputs */
      --plum:      #4A2E3A;   /* headings */
      --rust:      #C1602A;   /* primary accent */
      --butter:    #E8C468;
      --sage:      #8A9B7E;
      --sage-text: #6F8264;
      --ink:       #292524;   /* body text */
      --border:    #EADFC8;
      --panel-bg:  #4A2E3A;   /* dark plum panels / cook mode */
      --panel-text:#F7F2E7;   /* text on dark panels & accent buttons */
      --dial-track:#E8DFCB;
      --muted:     rgba(41,37,36,0.6);
      --muted-2:   rgba(41,37,36,0.5);
      color-scheme: light;
    }
    [data-theme="dark"] {
      --parchment: #1b1815;   /* warm charcoal page */
      --surface:   #272019;   /* cards */
      --plum:      #f1e8d6;   /* headings -> warm ivory (no more pink) */
      --rust:      #db8246;   /* primary accent */
      --butter:    #e8c468;
      --sage:      #a3b594;
      --sage-text: #b1c49f;
      --ink:       #ddd2bf;   /* body text */
      --border:    #3a322a;
      --panel-bg:  #2d251d;   /* dark panels / cook mode */
      --panel-text:#f4ecdb;
      --dial-track:#3a322a;
      --muted:     rgba(221,210,191,0.6);
      --muted-2:   rgba(221,210,191,0.5);
      color-scheme: dark;
    }

    html, body { background-color: var(--parchment); }
    body { margin: 0; }

    .font-display { font-family: 'Fraunces', serif; }
    .font-body    { font-family: 'Inter', sans-serif; }
    .font-mono    { font-family: 'JetBrains Mono', monospace; }

    /* Theme-driven color classes (replace original hardcoded ones) */
    .bg-parchment { background-color: var(--parchment); }
    .bg-surface   { background-color: var(--surface); }
    .bg-plum      { background-color: var(--panel-bg); }
    .bg-rust      { background-color: var(--rust); }
    .bg-butter    { background-color: var(--butter); }
    .bg-sage      { background-color: var(--sage); }
    .text-ink       { color: var(--ink); }
    .text-parchment { color: var(--panel-text); }
    .text-rust      { color: var(--rust); }
    .text-plum      { color: var(--plum); }
    .text-sage      { color: var(--sage-text); }
    .text-butter    { color: var(--butter); }

    /* Opacity-tinted accents, theme-aware via color-mix */
    .bg-sage\/10  { background-color: color-mix(in srgb, var(--sage) 13%, transparent); }
    .bg-sage\/20  { background-color: color-mix(in srgb, var(--sage) 24%, transparent); }
    .bg-sage\/30  { background-color: color-mix(in srgb, var(--sage) 34%, transparent); }
    .bg-rust\/10  { background-color: color-mix(in srgb, var(--rust) 13%, transparent); }
    .bg-rust\/20  { background-color: color-mix(in srgb, var(--rust) 22%, transparent); }
    .bg-butter\/40{ background-color: color-mix(in srgb, var(--butter) 42%, transparent); }
    .bg-butter\/90{ background-color: color-mix(in srgb, var(--butter) 90%, transparent); }
    .text-rust\/40{ color: color-mix(in srgb, var(--rust) 48%, transparent); }
    .ring-rust\/40{ --tw-ring-color: color-mix(in srgb, var(--rust) 48%, transparent); }
    .border-rust  { border-color: var(--rust); }

    /* Themed border override (beats Tailwind preflight default border color) */
    .bd { border-color: var(--border) !important; }

    /* muted ink helpers used in markup */
    .text-muted   { color: var(--muted); }

    /* Nice tap behavior on mobile */
    button { -webkit-tap-highlight-color: transparent; }
    .clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* Collapse animation */
    .collapse-body { display: grid; grid-template-rows: 1fr; transition: grid-template-rows .25s ease; }
    .collapse-body.closed { grid-template-rows: 0fr; }
    .collapse-inner { overflow: hidden; min-height: 0; }

    ::selection { background: color-mix(in srgb, var(--rust) 30%, transparent); }
  </style>
</head>
<body class="font-body text-ink">

  <script type="text/babel" src="app/icons.jsx"></script>

  <script type="text/babel" src="app/ui.jsx"></script>
  <script type="text/babel" src="app/detail.jsx"></script>
  <script type="text/babel" src="app/form.jsx"></script>
  <script type="text/babel" src="app/modals.jsx"></script>
  <script type="text/babel" src="app/syncui.jsx"></script>
  <script type="text/babel" src="app/shopping.jsx"></script>
  <script type="text/babel" src="app/main.jsx"></script>
</body>
</html>
