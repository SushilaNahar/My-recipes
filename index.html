<title>My Cookbook</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Inter',sans-serif;background:#F7F2E7;color:#292524;min-height:100vh;}
button{font:inherit;cursor:pointer;background:none;border:none;}
input,textarea{font:inherit;}
.fd{font-family:'Fraunces',serif;}
.fm{font-family:'JetBrains Mono',monospace;}
/* layout */
.flex{display:flex;}.flex-col{flex-direction:column;}.flex-wrap{flex-wrap:wrap;}
.flex1{flex:1 1 0%;}.shrink0{flex-shrink:0;}
.items-center{align-items:center;}.items-start{align-items:flex-start;}.items-baseline{align-items:baseline;}
.justify-center{justify-content:center;}.justify-between{justify-content:space-between;}
.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1rem;}
@media(max-width:600px){.grid2{grid-template-columns:1fr;}}
.gap1{gap:.25rem;}.gap2{gap:.5rem;}.gap3{gap:.75rem;}.gap4{gap:1rem;}
.col-gap2{column-gap:.5rem;}.col-gap3{column-gap:.75rem;}
.space2>*+*{margin-top:.5rem;}.space3>*+*{margin-top:.75rem;}.space4>*+*{margin-top:1rem;}
/* position */
.rel{position:relative;}.fixed{position:fixed;}.abs{position:absolute;}
.inset0{top:0;right:0;bottom:0;left:0;}
.top0{top:0;}.left0{left:0;}.right0{right:0;}.bottom0{bottom:0;}
.bot4{bottom:1rem;}.bot6{bottom:1.5rem;}.right6{right:1.5rem;}
.z50{z-index:50;}
/* sizing */
.w6{width:1.5rem;}.w9{width:2.25rem;}.w10{width:2.5rem;}.w12{width:3rem;}.w14{width:3.5rem;}
.w20{width:5rem;}.w24{width:6rem;}.wfull{width:100%;}
.h6{height:1.5rem;}.h9{height:2.25rem;}.h10{height:2.5rem;}.h12{height:3rem;}.h15{height:.375rem;}
.h24{height:6rem;}
.minscreen{min-height:100vh;}
.max2xl{max-width:42rem;}.max3xl{max-width:48rem;}.maxmd{max-width:28rem;}
.mxauto{margin-left:auto;margin-right:auto;}
/* spacing */
.p1{padding:.25rem;}.p2{padding:.5rem;}.p3{padding:.75rem;}.p4{padding:1rem;}.p5{padding:1.25rem;}.p10{padding:2.5rem;}
.px2{padding-left:.5rem;padding-right:.5rem;}.px3{padding-left:.75rem;padding-right:.75rem;}
.px4{padding-left:1rem;padding-right:1rem;}.px5{padding-left:1.25rem;padding-right:1.25rem;}
.px6{padding-left:1.5rem;padding-right:1.5rem;}
.py1{padding-top:.25rem;padding-bottom:.25rem;}.py15{padding-top:.375rem;padding-bottom:.375rem;}
.py2{padding-top:.5rem;padding-bottom:.5rem;}.py25{padding-top:.625rem;padding-bottom:.625rem;}
.py3{padding-top:.75rem;padding-bottom:.75rem;}.py4{padding-top:1rem;padding-bottom:1rem;}
.py5{padding-top:1.25rem;padding-bottom:1.25rem;}
.pb24{padding-bottom:6rem;}.pb32{padding-bottom:8rem;}.pt6{padding-top:1.5rem;}.pt8{padding-top:2rem;}
.mb1{margin-bottom:.25rem;}.mb2{margin-bottom:.5rem;}.mb3{margin-bottom:.75rem;}
.mb4{margin-bottom:1rem;}.mb5{margin-bottom:1.25rem;}.mb6{margin-bottom:1.5rem;}.mb8{margin-bottom:2rem;}
.mt05{margin-top:.125rem;}.mt2{margin-top:.5rem;}.mt3{margin-top:.75rem;}
/* typography */
.xs{font-size:.75rem;line-height:1rem;}.sm{font-size:.875rem;line-height:1.25rem;}
.f10{font-size:10px;}
.lg{font-size:1.125rem;line-height:1.75rem;}.xl{font-size:1.25rem;line-height:1.75rem;}
.xl2{font-size:1.5rem;line-height:2rem;}.xl3{font-size:1.875rem;line-height:2.25rem;}
.xl4{font-size:2.25rem;line-height:2.5rem;}
.fw5{font-weight:500;}.fw6{font-weight:600;}.fw7{font-weight:700;}
.upper{text-transform:uppercase;}.tcenter{text-align:center;}.tleft{text-align:left;}
.track{letter-spacing:.025em;}.track-wide{letter-spacing:.1em;}
.relax{line-height:1.625;}
.clamp2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.underline{text-decoration:underline;}
/* colors */
.bg-parchment{background-color:#F7F2E7;}.bg-plum{background-color:#4A2E3A;}
.bg-rust{background-color:#C1602A;}.bg-butter{background-color:#E8C468;}
.bg-sage{background-color:#8A9B7E;}.bg-white{background-color:#fff;}
.c-ink{color:#292524;}.c-parchment{color:#F7F2E7;}.c-rust{color:#C1602A;}
.c-plum{color:#4A2E3A;}.c-sage{color:#6F8264;}.c-butter{color:#E8C468;}.c-white{color:#fff;}
.c-ink40{color:rgba(41,37,36,.4);}.c-ink50{color:rgba(41,37,36,.5);}
.c-ink60{color:rgba(41,37,36,.6);}.c-ink70{color:rgba(41,37,36,.7);}.c-ink80{color:rgba(41,37,36,.8);}
.c-parchment70{color:rgba(247,242,231,.7);}.c-parchment90{color:rgba(247,242,231,.9);}
.c-butter90{color:rgba(232,196,104,.9);}
.bg-sage10{background-color:rgba(138,155,126,.12);}.bg-sage20{background-color:rgba(138,155,126,.22);}
.bg-rust10{background-color:rgba(193,96,42,.1);}.bg-rust20{background-color:rgba(193,96,42,.2);}
.bg-butter40{background-color:rgba(232,196,104,.4);}
.bg-parchment5{background-color:rgba(247,242,231,.05);}
.bg-parchment10{background-color:rgba(247,242,231,.1);}
/* borders */
.border{border:1px solid #EADFC8;}.border2{border:2px dashed #D8CBAE;}
.border-top{border-top:1px solid #EADFC8;}
.b-rust{border-color:#C1602A !important;}.b-parchment20{border-color:rgba(247,242,231,.2);}
.rounded{border-radius:.5rem;}.rounded-xl{border-radius:.75rem;}
.rounded-2xl{border-radius:1rem;}.rounded-full{border-radius:9999px;}
/* shadows */
.shadow{box-shadow:0 1px 3px rgba(0,0,0,.1);}.shadow-sm{box-shadow:0 1px 2px rgba(0,0,0,.05);}
.shadow-lg{box-shadow:0 10px 15px -3px rgba(0,0,0,.1);}
/* misc */
.hidden{display:none;}.block{display:block;}.inline-block{display:inline-block;}
.opacity40{opacity:.4;}.opacity30{opacity:.3;}
.transition{transition:all .15s ease;}
.cursor-grab{cursor:grab;}
input[type=number]{-moz-appearance:textfield;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
/* component helpers */
.tag{font-family:'JetBrains Mono',monospace;font-size:.75rem;padding:.25rem .5rem;border-radius:9999px;}
.input-base{width:100%;background:#fff;border:1px solid #EADFC8;border-radius:.5rem;padding:.5rem .75rem;font-size:.875rem;color:#292524;outline:none;}
.input-base:focus{box-shadow:0 0 0 2px rgba(193,96,42,.3);}
.btn-rust{background:#C1602A;color:#F7F2E7;border-radius:9999px;padding:.75rem 1.25rem;font-weight:500;transition:opacity .15s;}
.btn-rust:hover{opacity:.9;}.btn-rust:disabled{opacity:.4;}
.step-bar{height:.375rem;border-radius:9999px;flex:1;}
</style>
</head>

const {useState,useEffect,useRef} = React;
const STORAGE_KEY = 'my-cookbook-v2';

const SEED_RECIPES = [
  {id:'seed-1',title:'Weeknight Garlic Butter Pasta',description:'A fast, comforting pasta that teaches you how to build a pan sauce from scratch.',baseServings:2,tags:['Beginner','20 min'],ingredients:[{id:'i1',name:'Spaghetti',amount:200,unit:'g'},{id:'i2',name:'Butter',amount:3,unit:'tbsp'},{id:'i3',name:'Garlic cloves, minced',amount:4,unit:''},{id:'i4',name:'Red chili flakes',amount:0.5,unit:'tsp'},{id:'i5',name:'Parmesan, grated',amount:0.5,unit:'cup'},{id:'i6',name:'Salt',amount:1,unit:'tsp'},{id:'i7',name:'Black pepper',amount:0.25,unit:'tsp'},{id:'i8',name:'Fresh parsley, chopped',amount:2,unit:'tbsp'}],steps:[{id:'s1',title:'Boil the pasta',content:'Bring a large pot of water to a boil. Salt it generously, then add the {i1}.',why:'Salting the water is your only chance to season the pasta itself — it should taste like the sea.',timerSeconds:600},{id:'s2',title:'Save the starchy water',content:'Just before draining, scoop out about 1 cup of the pasta water and set it aside.',why:'This cloudy water is full of starch and will help the sauce cling to the pasta later.',timerSeconds:null},{id:'s3',title:'Build the garlic butter',content:'While the pasta cooks, melt {i2} in a large pan over medium-low heat. Add {i3} and {i4}, and cook gently until fragrant.',why:'Low heat is key — burnt garlic turns bitter and there is no fixing it. Aim for golden, not brown.',timerSeconds:120},{id:'s4',title:'Combine',content:'Add the drained pasta to the pan along with a splash of the reserved pasta water. Toss well.',why:'The starchy water emulsifies with the butter, creating a glossy sauce that coats every strand.',timerSeconds:null},{id:'s5',title:'Finish',content:'Remove from heat and stir in {i5}, {i6}, and {i7}. Add more pasta water if it looks dry. Top with {i8} and serve right away.',why:'Adding cheese off the heat keeps it from clumping into a greasy mess.',timerSeconds:null}]},
  {id:'seed-2',title:'Khandvi',description:"A delicate Gujarati snack of rolled gram-flour batter, finished with a mustard-seed tempering. The tricky part is the batter — the 'plate test' is your guide.",baseServings:4,tags:['Intermediate','40 min'],ingredients:[{id:'i1',name:'Besan (gram flour)',amount:1,unit:'cup'},{id:'i2',name:'Sour yogurt (curd)',amount:0.75,unit:'cup'},{id:'i3',name:'Water',amount:2.25,unit:'cup'},{id:'i4',name:'Ginger-green chili paste',amount:1,unit:'tsp'},{id:'i5',name:'Turmeric powder',amount:0.25,unit:'tsp'},{id:'i6',name:'Salt',amount:0.667,unit:'tsp'},{id:'i7',name:'Asafoetida (hing)',amount:1,unit:'pinch'},{id:'i8',name:'Fresh grated coconut',amount:2,unit:'tbsp'},{id:'i9',name:'Chopped coriander leaves',amount:2,unit:'tbsp'},{id:'i10',name:'Oil, for tempering',amount:1,unit:'tbsp'},{id:'i11',name:'Curry leaves',amount:9,unit:''},{id:'i12',name:'Mustard seeds',amount:1,unit:'tsp'},{id:'i13',name:'White sesame seeds',amount:2,unit:'tsp'},{id:'i14',name:'Green chili, chopped (for tempering)',amount:1,unit:'tsp'}],steps:[{id:'s1',title:'Make the buttermilk',content:'Whisk {i2} with {i3} until smooth and lump-free.',why:'This thin, smooth buttermilk is the base of the batter — getting it lump-free here makes everything easier later.',timerSeconds:null},{id:'s2',title:'Add the spices',content:"Stir in {i4}, {i5}, {i6}, and {i7}. If your yogurt isn't very sour, add a squeeze of lemon juice for tang.",why:'The 1:3 ratio of besan to buttermilk is what gives khandvi its texture — keep that proportion even if you scale the recipe.',timerSeconds:null},{id:'s3',title:'Whisk in the besan',content:'Add {i1} and whisk thoroughly until completely smooth with no lumps.',why:'Any lumps now become hard bits later. Keep whisking — a hand whisk or beater both work.',timerSeconds:null},{id:'s4',title:'Prep your rolling surface',content:'Lightly grease large plates or trays with oil. Mix {i8} and {i9} together in a small bowl for the filling.',why:"The cooked batter sets fast, so have your surface and filling ready before you start cooking — there is no pause once it's done.",timerSeconds:null},{id:'s5',title:'Cook the batter',content:'Pour the batter into a saucepan over the lowest heat. Stir constantly as it heats, thickens, and eventually leaves the sides of the pan.',why:'Low heat and constant stirring prevent lumps. This takes around 15–17 minutes — resist the urge to raise the heat.',timerSeconds:1020},{id:'s6',title:'Do the plate test',content:'Spread a small spoonful of batter thinly on a plate, let it cool for a few seconds, then try to roll it. If it rolls smoothly without sticking, the batter is ready.',why:'This is the single most important step. Undercooked batter won\'t roll; overcooked batter gets too thick to spread thinly.',timerSeconds:null},{id:'s7',title:'Spread it thin',content:'Working quickly while the batter is still hot, pour about ½ to ⅔ cup onto each greased plate and spread into a thin, even layer.',why:'Speed is everything here — the batter thickens as it cools.',timerSeconds:null},{id:'s8',title:'Add filling and roll',content:'Once cooled slightly, sprinkle with the coconut-coriander mixture. Cut into strips and roll each into a tight spiral.',why:"If a strip tears, it was spread too thick — just roll it as best you can, it'll still taste good.",timerSeconds:null},{id:'s9',title:'Make the tempering',content:'Heat {i10}. Add {i12} and let crackle, then add {i11} and {i14}. Stir in {i13} until they crackle. Pour over the rolls.',why:'This spiced oil is poured over the dish at the end for a final hit of aroma and crunch.',timerSeconds:60}]},
  {id:'seed-3',title:'Vegetable Green Thai Curry',description:'An authentic homemade Thai green curry with freshly made paste, coconut milk and crunchy vegetables. The fresh paste is what makes it special.',baseServings:4,tags:['Intermediate','Thai','45 min','Vegan'],ingredients:[{id:'i1',name:'Coriander seeds',amount:1,unit:'tsp'},{id:'i2',name:'Cumin seeds',amount:1,unit:'tsp'},{id:'i3',name:'White peppercorns',amount:1,unit:'tsp'},{id:'i4',name:'Galangal (Thai ginger), peeled',amount:2,unit:'inch'},{id:'i5',name:'Fresh turmeric',amount:0.5,unit:'inch'},{id:'i6',name:'Lemongrass stalks (bottom soft part only)',amount:2,unit:''},{id:'i7',name:'Garlic cloves',amount:9,unit:''},{id:'i8',name:'Shallots (Madras onions)',amount:4,unit:''},{id:'i9',name:'Dark green chilies',amount:9,unit:''},{id:'i10',name:'Lemon zest (or kaffir lime zest)',amount:1,unit:'tsp'},{id:'i11',name:'Coriander stalks and roots',amount:4,unit:''},{id:'i12',name:'Salt',amount:1,unit:'pinch'},{id:'i13',name:'Miso paste (vegetarian umami)',amount:1,unit:'tsp'},{id:'i14',name:'Coconut milk (first)',amount:200,unit:'ml'},{id:'i15',name:'Coconut milk (remaining)',amount:800,unit:'ml'},{id:'i16',name:'Baby corn',amount:0.5,unit:'cup'},{id:'i17',name:'Mushrooms',amount:0.5,unit:'cup'},{id:'i18',name:'Broccoli florets',amount:0.5,unit:'cup'},{id:'i19',name:'Carrots, sliced',amount:0.5,unit:'cup'},{id:'i20',name:'Green capsicum, sliced',amount:0.5,unit:'cup'},{id:'i21',name:'Red bell pepper, sliced',amount:0.333,unit:'cup'},{id:'i22',name:'Brown sugar',amount:1.5,unit:'tbsp'},{id:'i23',name:'Kaffir lime leaves',amount:3,unit:''},{id:'i24',name:'Thai basil',amount:1,unit:'handful'},{id:'i25',name:'Large red chilies, sliced (garnish)',amount:2,unit:''}],steps:[{id:'s1',title:'Toast the spices',content:'Toast {i1} and {i2} in a dry pan for about 1 minute until fragrant.',why:'Toasting wakes up the essential oils in the spices, giving the paste a deeper, more complex flavour.',timerSeconds:60},{id:'s2',title:'Make the paste',content:'Grind toasted spices with {i3} into a fine powder. Add {i4}, {i5}, {i6}, {i7}, {i8}, {i9}, {i10}, {i11}, {i12}, and {i13}. Pound for 10–15 minutes (or grind 1–2 minutes) until a bright green paste forms.',why:'A mortar and pestle gives a more aromatic paste. A blender is fine if short on time.',timerSeconds:900},{id:'s3',title:'Reduce the coconut milk',content:'Pour {i14} into a wide pan and cook on high heat for 2–3 minutes until it thickens. No oil needed.',why:'Reducing coconut milk first concentrates the fat so the paste fries rather than boils — the key step most people skip.',timerSeconds:180},{id:'s4',title:'Fry the paste',content:'Add 3–4 tbsp of your fresh paste to the thickened coconut milk. Cook for 3–4 minutes, stirring, until the paste darkens and the oil separates.',why:'The oil splitting means the paste is cooked through. Don\'t skip this step.',timerSeconds:240},{id:'s5',title:'Add coconut milk and vegetables',content:'Pour in {i15} and stir well. Add {i16} first and boil for 7–8 minutes. Then add {i17}, {i18}, {i19}, {i20}, {i21}, {i22}, and salt to taste. Cook for 3–4 minutes — vegetables should stay crunchy.',why:'Baby corn takes longest — adding it first means everything finishes together. Overcooking kills colour and crunch.',timerSeconds:720},{id:'s6',title:'Final infusion',content:'Add {i23} (torn), {i24}, and {i25}. Cook for just 2 more minutes. Serve with jasmine rice.',why:'The lime leaves and basil are fragile — two minutes is enough to infuse without losing their aroma.',timerSeconds:120}]},
  {id:'seed-4',title:'Veg Dum Biryani',description:'A layered, aromatic biryani with parboiled basmati rice and spiced vegetables, slow-cooked on dum for perfectly separated, flavourful grains.',baseServings:4,tags:['Intermediate','Indian','1.5 hrs'],ingredients:[{id:'i1',name:'Basmati rice (long grain)',amount:2,unit:'cup'},{id:'i2',name:'Cauliflower florets',amount:1,unit:'cup'},{id:'i3',name:'Carrots, diced',amount:0.5,unit:'cup'},{id:'i4',name:'French beans, chopped',amount:0.5,unit:'cup'},{id:'i5',name:'Green peas',amount:0.5,unit:'cup'},{id:'i6',name:'Potatoes, cubed',amount:1,unit:'cup'},{id:'i7',name:'Thick yogurt (curd)',amount:0.75,unit:'cup'},{id:'i8',name:'Ginger-garlic paste',amount:2,unit:'tbsp'},{id:'i9',name:'Fried onions (birista)',amount:0.5,unit:'cup'},{id:'i10',name:'Fresh mint leaves',amount:0.5,unit:'cup'},{id:'i11',name:'Fresh coriander, chopped',amount:0.25,unit:'cup'},{id:'i12',name:'Ghee',amount:3,unit:'tbsp'},{id:'i13',name:'Saffron strands',amount:1,unit:'pinch'},{id:'i14',name:'Warm milk (for saffron)',amount:3,unit:'tbsp'},{id:'i15',name:'Shahi jeera (caraway seeds)',amount:1,unit:'tsp'},{id:'i16',name:'Bay leaves',amount:2,unit:''},{id:'i17',name:'Cinnamon stick',amount:1,unit:'inch'},{id:'i18',name:'Cloves',amount:4,unit:''},{id:'i19',name:'Green cardamom',amount:3,unit:''},{id:'i20',name:'Black cardamom',amount:1,unit:''},{id:'i21',name:'Red chili powder',amount:1,unit:'tsp'},{id:'i22',name:'Turmeric powder',amount:0.5,unit:'tsp'},{id:'i23',name:'Biryani masala',amount:2,unit:'tsp'},{id:'i24',name:'Salt',amount:1.5,unit:'tsp'},{id:'i25',name:'Oil',amount:2,unit:'tbsp'}],steps:[{id:'s1',title:'Soak the rice',content:'Wash {i1} until water runs clear. Soak in fresh water for at least 30 minutes, then drain.',why:'Soaking hydrates the grains so they elongate fully during cooking and stay separate.',timerSeconds:1800},{id:'s2',title:'Soak the saffron',content:'Crush {i13} lightly and soak in {i14}. Set aside.',why:null,timerSeconds:null},{id:'s3',title:'Marinate the vegetables',content:'Mix {i7}, {i8}, half of {i9}, half of {i10}, {i11}, {i21}, {i22}, {i23}, and {i24} in a large bowl. Add all vegetables and mix well. Marinate for at least 20 minutes.',why:'The yogurt marinade tenderises the vegetables and builds the flavour of the base gravy.',timerSeconds:1200},{id:'s4',title:'Cook the base gravy',content:'Heat {i25} in a heavy-bottomed pot. Add marinated vegetables and cook for 8–10 minutes until the gravy thickens and oil separates.',why:'You want the gravy thick enough to support the rice layers without making them soggy.',timerSeconds:600},{id:'s5',title:'Parboil the rice',content:'Boil a large pot of water. Add {i15}, {i16}, {i17}, {i18}, {i19}, {i20}, and generous salt. Add soaked rice and cook until 70–80% done (still has a slight bite). Drain immediately.',why:'Parboiling to exactly 70–80% is the most important step — the rice finishes on dum. Overcooked rice here means mushy biryani.',timerSeconds:480},{id:'s6',title:'Layer and seal',content:'Spread vegetable gravy in the bottom of a heavy pot. Layer parboiled rice on top. Drizzle saffron milk, {i12}, and scatter remaining {i9} and {i10} over the rice. Cover tightly (seal edges with dough or foil). Cook on high for 2 minutes, then lowest heat for 15–20 minutes.',why:'Dum cooking traps all the steam inside — this is what mingles the aromas and finishes the rice perfectly.',timerSeconds:1200},{id:'s7',title:'Rest and serve',content:'Rest undisturbed for 5 minutes. Then gently fluff from the sides with a wide spatula. Serve hot with raita.',why:'Always fluff from the sides — stirring from the top breaks the grains and collapses the layers.',timerSeconds:300}]},

// ---- Helpers ----
const FRACS=[[0.125,'⅛'],[0.25,'¼'],[0.333,'⅓'],[0.5,'½'],[0.667,'⅔'],[0.75,'¾'],[0.875,'⅞']];
function fmt(num){
  if(!num&&num!==0)return'';if(num===0)return'0';
  const w=Math.floor(num),f=num-w;
  for(const[v,s]of FRACS){if(Math.abs(f-v)<0.03)return w>0?`${w}${s}`:s;}
  const r=Math.round(num*100)/100;return r%1===0?r.toString():r.toFixed(2).replace(/0$/,'');
}
function scaleIng(ing,sc){const a=fmt(ing.amount*sc);return`${a}${ing.unit?' '+ing.unit:''} ${ing.name}`.trim();}
function renderContent(content,ings,sc){
  return content.replace(/\{(i[\w-]+)\}/g,(m,id)=>{const i=ings.find(x=>x.id===id);return i?scaleIng(i,sc):m;});
}
function fmtTime(s){const m=Math.floor(s/60),sec=s%60;return`${m}:${sec.toString().padStart(2,'0')}`;}
function newId(p){return`${p}-${Date.now()}-${Math.random().toString(36).slice(2,7)}`;}

function loadRecipes(){
  try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null;}catch(e){return null;}
}
function saveRecipes(r){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(r));return true;}catch(e){return false;}}

function initRecipes(){
  const stored=loadRecipes();
  if(!stored||!stored.length){
    saveRecipes(SEED_RECIPES);
    return SEED_RECIPES;
  }
  const ids=new Set(stored.map(r=>r.id));
  const newSeeds=SEED_RECIPES.filter(r=>!ids.has(r.id));
  if(newSeeds.length){
    const merged=[...stored,...newSeeds];
    saveRecipes(merged);
    return merged;
  }
  return stored;
}

// ---- Servings Dial ----
function ServingsDial({servings,base,onChange}){
  const pct=Math.max(8,Math.min((servings/(base*2))*100,100));
  return(
    <div className="flex items-center gap4">
      <button onClick={()=>onChange(Math.max(1,servings-1))} className="w10 h10 rounded-full flex items-center justify-center bg-rust c-parchment xl fw7 transition" style={{flexShrink:0}}>−</button>
      <div className="rel w24 h24 rounded-full flex items-center justify-center" style={{background:`conic-gradient(#C1602A ${pct}%,#E8DFCB ${pct}%)`,flexShrink:0}}>
        <div className="abs rounded-full bg-parchment flex flex-col items-center justify-center" style={{inset:6}}>
          <span className="fm xl2 fw7 c-plum">{servings}</span>
          <span className="f10 upper track c-ink50">servings</span>
        </div>
      </div>
      <button onClick={()=>onChange(servings+1)} className="w10 h10 rounded-full flex items-center justify-center bg-rust c-parchment xl fw7 transition" style={{flexShrink:0}}>+</button>
    </div>
  );
}

// ---- Library ----
function Library({recipes,onOpen,onAdd,onExport,onImport}){
  const [selTags,setSelTags]=useState([]);
  const [showPaste,setShowPaste]=useState(false);
  const [pasteText,setPasteText]=useState('');
  const fileRef=useRef(null);
  const allTags=[...new Set(recipes.flatMap(r=>r.tags||[]))].sort();
  const toggle=tag=>setSelTags(p=>p.includes(tag)?p.filter(t=>t!==tag):[...p,tag]);
  const filtered=selTags.length===0?recipes:recipes.filter(r=>(r.tags||[]).some(t=>selTags.includes(t)));

  const handlePasteImport=()=>{
    try{
      const data=JSON.parse(pasteText);
      if(!Array.isArray(data))throw new Error('not array');
      onImport(data);
      setShowPaste(false);setPasteText('');
    }catch(e){alert("Couldn't read that — make sure you pasted a full cookbook export.");}
  };

  return(
    <div className="max3xl mxauto px5 pb24 pt8">
      <div className="flex items-center justify-between gap3 mb1">
        <div className="flex items-center gap3">
          <span style={{fontSize:28}}>🍳</span>
          <h1 className="fd xl3 fw7 c-plum">My Cookbook</h1>
        </div>
        <div className="flex gap2">
          <button onClick={onExport} className="xs px3 py15 rounded-full border c-ink60 transition" style={{background:'#fff'}}>⬇ Export</button>
          <button onClick={()=>setShowPaste(true)} className="xs px3 py15 rounded-full border c-ink60 transition" style={{background:'#fff'}}>📋 Paste</button>
          <button onClick={()=>fileRef.current?.click()} className="xs px3 py15 rounded-full border c-ink60 transition" style={{background:'#fff'}}>⬆ Import</button>
          <input ref={fileRef} type="file" accept="application/json" className="hidden" onChange={e=>{
            const f=e.target.files[0];if(!f)return;
            const rd=new FileReader();rd.onload=()=>{try{const d=JSON.parse(rd.result);if(Array.isArray(d))onImport(d);else alert('Invalid file.');}catch(e){alert('Could not read file.');}};
            rd.readAsText(f);e.target.value='';
          }}/>
        </div>
      </div>
      <p className="c-ink60 mb5 sm">{recipes.length} recipe{recipes.length===1?'':'s'} — saved on this device.</p>

      {allTags.length>0&&(
        <div className="flex flex-wrap gap2 mb6">
          {allTags.map(tag=>{
            const active=selTags.includes(tag);
            return <button key={tag} onClick={()=>toggle(tag)} className="tag transition" style={{background:active?'#C1602A':'#fff',color:active?'#F7F2E7':'rgba(41,37,36,.6)',border:'1px solid '+(active?'#C1602A':'#EADFC8')}}>{tag}</button>;
          })}
          {selTags.length>0&&<button onClick={()=>setSelTags([])} className="xs px3 py15 c-rust underline">Clear</button>}
        </div>
      )}

      {recipes.length===0&&(
        <div className="border2 rounded-2xl p10 tcenter">
          <p style={{fontSize:36,marginBottom:12}}>📖</p>
          <h2 className="fd xl fw6 c-plum mb1">Your cookbook is empty</h2>
          <p className="c-ink60 sm mb5">Add your first recipe to get started.</p>
          <button onClick={onAdd} className="btn-rust px5 py25">Add a recipe</button>
        </div>
      )}

      {recipes.length>0&&filtered.length===0&&<p className="c-ink50 sm">No recipes match these tags.</p>}

      {filtered.length>0&&(
        <div className="grid2">
          {filtered.map(r=>(
            <button key={r.id} onClick={()=>onOpen(r.id)} className="tleft bg-white rounded-2xl p5 shadow-sm border transition" style={{display:'block'}}>
              <h3 className="fd lg fw6 c-plum mb1">{r.title}</h3>
              {r.description&&<p className="c-ink60 sm mb3 clamp2">{r.description}</p>}
              <div className="flex flex-wrap gap2">
                {(r.tags||[]).map(t=><span key={t} className="tag bg-sage20 c-sage">{t}</span>)}
                <span className="tag bg-butter40 c-plum">serves {r.baseServings}</span>
              </div>
            </button>
          ))}
        </div>
      )}

      {recipes.length>0&&(
        <button onClick={onAdd} className="fixed bot6 right6 bg-rust c-parchment w14 h12 rounded-full shadow-lg flex items-center justify-center xl fw7" style={{fontSize:28,lineHeight:1}}>+</button>
      )}

      {showPaste&&(
        <div className="fixed inset0 flex items-center justify-center" style={{background:'rgba(74,46,58,.6)',zIndex:50,padding:'1.25rem'}}>
          <div className="bg-parchment rounded-2xl p5 wfull flex flex-col" style={{maxWidth:'32rem',maxHeight:'80vh'}}>
            <div className="flex items-center justify-between mb3">
              <h2 className="fd lg fw6 c-plum">Paste recipes</h2>
              <button onClick={()=>{setShowPaste(false);setPasteText('');}} className="c-ink50 xl" style={{lineHeight:1}}>×</button>
            </div>
            <p className="sm c-ink70 mb3">Paste the JSON text you copied from the Export button in the Claude cookbook.</p>
            <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} className="input-base flex1" style={{minHeight:160,fontFamily:'monospace',fontSize:'.75rem'}} placeholder="Paste here…"/>
            <button onClick={handlePasteImport} disabled={!pasteText.trim()} className="btn-rust mt3 py3" style={{width:'100%'}}>Add to my cookbook</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ---- Recipe Detail ----
function RecipeDetail({recipe,onBack,onEdit,onDelete,onCook}){
  const [servings,setServings]=useState(recipe.baseServings);
  const [confirmDel,setConfirmDel]=useState(false);
  const scale=servings/recipe.baseServings;
  useEffect(()=>setServings(recipe.baseServings),[recipe.id]);
  return(
    <div className="max2xl mxauto px5 pb24 pt6">
      <button onClick={onBack} className="flex items-center gap2 c-ink60 sm mb4">← Cookbook</button>
      <div className="flex items-start justify-between gap3 mb2">
        <h1 className="fd xl3 fw7 c-plum">{recipe.title}</h1>
        <div className="flex gap2" style={{flexShrink:0}}>
          <button onClick={()=>onEdit(recipe.id)} className="w9 h9 rounded-full flex items-center justify-center bg-sage10 c-plum">✏️</button>
          <button onClick={()=>confirmDel?onDelete(recipe.id):setConfirmDel(true)} onBlur={()=>setConfirmDel(false)} className={`w9 h9 rounded-full flex items-center justify-center ${confirmDel?'bg-rust c-parchment':'bg-rust10 c-rust'}`}>🗑️</button>
        </div>
      </div>
      {confirmDel&&<p className="xs c-rust mb2">Tap delete again to confirm.</p>}
      {recipe.description&&<p className="c-ink70 mb3">{recipe.description}</p>}
      {(recipe.tags||[]).length>0&&(
        <div className="flex flex-wrap gap2 mb5">
          {recipe.tags.map(t=><span key={t} className="tag bg-sage20 c-sage">{t}</span>)}
        </div>
      )}
      <div className="bg-plum rounded-2xl p5 mb6 flex items-center justify-between flex-wrap gap4">
        <div>
          <p className="c-parchment70 xs upper track mb1">Adjust servings</p>
          <p className="c-parchment sm">Ingredients scale automatically.</p>
        </div>
        <ServingsDial servings={servings} base={recipe.baseServings} onChange={setServings}/>
      </div>
      <section className="mb8">
        <h2 className="fd xl fw6 c-plum mb3">Ingredients</h2>
        <ul className="space2">
          {recipe.ingredients.map(ing=>(
            <li key={ing.id} className="flex items-baseline gap3 bg-white rounded-xl px4 py25 border">
              <span className="fm sm fw7 c-rust" style={{width:'5rem',flexShrink:0}}>{fmt(ing.amount*scale)}{ing.unit?' '+ing.unit:''}</span>
              <span className="c-ink80 sm">{ing.name}</span>
            </li>
          ))}
        </ul>
      </section>
      <section className="mb6">
        <div className="flex items-center justify-between mb3">
          <h2 className="fd xl fw6 c-plum">Steps</h2>
          <button onClick={()=>onCook(recipe.id)} className="flex items-center gap2 bg-rust c-parchment px4 py2 rounded-full sm fw5">▶ Start cooking</button>
        </div>
        <ol className="space4">
          {recipe.steps.map((step,i)=>(
            <li key={step.id} className="bg-white rounded-xl p4 border">
              <div className="flex items-start gap3">
                <span className="fm xs fw7 c-parchment bg-sage rounded-full w6 h6 flex items-center justify-center" style={{flexShrink:0,marginTop:2}}>{i+1}</span>
                <div style={{flex:1}}>
                  <div className="flex items-center justify-between gap2 mb1">
                    <h3 className="fw6 c-plum sm">{step.title}</h3>
                    {step.timerSeconds&&<span className="xs fm c-ink50">⏱ {fmtTime(step.timerSeconds)}</span>}
                  </div>
                  <p className="c-ink80 sm">{renderContent(step.content,recipe.ingredients,scale)}</p>
                  {step.why&&<p className="mt2 xs c-sage flex items-start gap2 bg-sage10 rounded-xl p2">💡 {step.why}</p>}
                </div>
              </div>
            </li>
          ))}
        </ol>
      </section>
    </div>
  );
}

function CookMode({recipe,onExit}){
  const [idx,setIdx]=useState(0);
  const [rem,setRem]=useState(null);
  const [running,setRunning]=useState(false);
  const timer=useRef(null);
  const step=recipe.steps[idx];
  useEffect(()=>{setRem(step.timerSeconds||null);setRunning(false);clearInterval(timer.current);},[idx]);
  useEffect(()=>{
    if(running&&rem>0){timer.current=setInterval(()=>setRem(r=>{if(r<=1){clearInterval(timer.current);setRunning(false);return 0;}return r-1;}),1000);}
    return()=>clearInterval(timer.current);
  },[running]);
  const go=i=>{if(i>=0&&i<recipe.steps.length)setIdx(i);};
  return(
    <div className="fixed inset0 bg-plum flex flex-col">
      <div className="flex items-center justify-between px5 py4">
        <button onClick={onExit} className="c-parchment70 sm flex items-center gap1">✕ Exit</button>
        <span className="c-parchment70 sm fm">{idx+1} / {recipe.steps.length}</span>
      </div>
      <div className="flex gap2 px5 mb2">
        {recipe.steps.map((_,i)=><div key={i} className="step-bar" style={{background:i<=idx?'#D4A23A':'rgba(247,242,231,.15)'}}/>)}
      </div>
      <div className="flex1 flex flex-col items-center justify-center px6 tcenter">
        <p className="fm xs upper track-wide c-butter mb3">Step {idx+1}</p>
        <h2 className="fd xl2 fw7 c-parchment mb4">{step.title}</h2>
        <p className="c-parchment90 lg relax" style={{maxWidth:'28rem',marginBottom:'1.25rem'}}>{renderContent(step.content,recipe.ingredients,1)}</p>
        {step.why&&<p className="sm flex items-start gap2 c-butter90 rounded-xl p3 mb5" style={{maxWidth:'28rem',background:'rgba(247,242,231,.05)',textAlign:'left'}}>💡 {step.why}</p>}
        {step.timerSeconds&&(
          <div className="flex items-center gap4">
            <span className="fm xl4 fw7 c-parchment">{fmtTime(rem??step.timerSeconds)}</span>
            <button onClick={()=>setRunning(r=>!r)} className="w12 h12 rounded-full bg-rust c-parchment flex items-center justify-center lg">{running?'⏸':'▶'}</button>
            <button onClick={()=>{setRem(step.timerSeconds);setRunning(false);}} className="w12 h12 rounded-full c-parchment flex items-center justify-center lg" style={{background:'rgba(247,242,231,.1)'}}>↺</button>
          </div>
        )}
      </div>
      <div className="flex items-center justify-between px5 py5 gap3">
        <button onClick={()=>go(idx-1)} disabled={idx===0} className="flex1 flex items-center justify-center gap2 py3 rounded-full c-parchment b-parchment20" style={{border:'1px solid rgba(247,242,231,.2)',opacity:idx===0?.3:1}}>← Back</button>
        {idx===recipe.steps.length-1
          ?<button onClick={onExit} className="flex1 flex items-center justify-center gap2 py3 rounded-full bg-butter c-plum fw6">✓ Done</button>
          :<button onClick={()=>go(idx+1)} className="flex1 flex items-center justify-center gap2 py3 rounded-full bg-rust c-parchment fw6">Next →</button>
        }
      </div>
    </div>
  );
}

// ---- Recipe Form ----
function emptyRecipe(){return{id:newId('r'),title:'',description:'',baseServings:4,tags:[],ingredients:[{id:newId('i'),name:'',amount:1,unit:''}],steps:[{id:newId('s'),title:'',content:'',why:'',timerSeconds:null}]};}

function RecipeForm({initial,onSave,onCancel}){
  const [draft,setDraft]=useState(initial?JSON.parse(JSON.stringify(initial)):emptyRecipe());
  const [tagsInput,setTagsInput]=useState((initial?.tags||[]).join(', '));
  const [aiInput,setAiInput]=useState('');
  const [aiLoading,setAiLoading]=useState(false);
  const [aiNote,setAiNote]=useState('');
  const [aiError,setAiError]=useState('');
  const [showAi,setShowAi]=useState(!initial);

  const upField=(f,v)=>setDraft(d=>({...d,[f]:v}));
  const upIng=(id,f,v)=>setDraft(d=>({...d,ingredients:d.ingredients.map(i=>i.id===id?{...i,[f]:v}:i)}));
  const addIng=()=>setDraft(d=>({...d,ingredients:[...d.ingredients,{id:newId('i'),name:'',amount:1,unit:''}]}));
  const remIng=id=>setDraft(d=>({...d,ingredients:d.ingredients.filter(i=>i.id!==id)}));
  const upStep=(id,f,v)=>setDraft(d=>({...d,steps:d.steps.map(s=>s.id===id?{...s,[f]:v}:s)}));
  const addStep=()=>setDraft(d=>({...d,steps:[...d.steps,{id:newId('s'),title:'',content:'',why:'',timerSeconds:null}]}));
  const remStep=id=>setDraft(d=>({...d,steps:d.steps.filter(s=>s.id!==id)}));
  const handleTagsChange=v=>{setTagsInput(v);setDraft(d=>({...d,tags:v.split(',').map(t=>t.trim()).filter(Boolean)}));};

  const handleAiImport=async()=>{
    if(!aiInput.trim())return;
    setAiLoading(true);setAiNote('');setAiError('');
    try{
      const prompt=`Extract this recipe and respond ONLY with a single JSON object (no markdown fences):
{"title":string,"description":string,"baseServings":number,"tags":string[],"ingredients":[{"name":string,"amount":number,"unit":string}],"steps":[{"title":string,"content":string,"why":string|null,"timerMinutes":number|null}]}
Input: ${aiInput.trim()}`;
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:prompt}]})});
      const data=await res.json();
      const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
      const clean=text.replace(/```json|```/g,'').trim();
      const s=clean.indexOf('{'),e=clean.lastIndexOf('}');
      const parsed=JSON.parse(clean.slice(s,e+1));
      setDraft(d=>({...d,
        title:parsed.title||d.title,description:parsed.description||d.description,
        baseServings:Math.max(1,Number(parsed.baseServings)||d.baseServings),
        tags:parsed.tags||d.tags,
        ingredients:(parsed.ingredients||[]).map(i=>({id:newId('i'),name:i.name||'',amount:Number(i.amount)||1,unit:i.unit||''})),
        steps:(parsed.steps||[]).map(s=>({id:newId('s'),title:s.title||'',content:s.content||'',why:s.why||'',timerSeconds:s.timerMinutes?Math.round(Number(s.timerMinutes)*60):null})),
      }));
      setTagsInput((parsed.tags||[]).join(', '));
      setAiNote(`Imported "${parsed.title||'recipe'}" — review and save.`);
    }catch(e){setAiError("Couldn't extract a recipe. Try a different link or paste the recipe text.");}
    finally{setAiLoading(false);}
  };

  const handleSave=()=>{
    const cleaned={...draft,title:draft.title.trim()||'Untitled recipe',tags:draft.tags||[],
      ingredients:draft.ingredients.filter(i=>i.name.trim()),
      steps:draft.steps.filter(s=>s.content.trim()||s.title.trim()),
      baseServings:Math.max(1,Number(draft.baseServings)||1),userEdited:true};
    onSave(cleaned);
  };

  const inp='input-base';
  return(
    <div className="max2xl mxauto px5 pb32 pt6">
      <button onClick={onCancel} className="flex items-center gap1 c-ink60 sm mb4">← Cancel</button>
      <h1 className="fd xl2 fw7 c-plum mb5">{initial?'Edit recipe':'New recipe'}</h1>

      <section className="mb6 bg-white rounded-2xl border p4">
        <button onClick={()=>setShowAi(s=>!s)} className="flex items-center justify-between wfull tleft">
          <span className="fd lg fw6 c-plum">✨ Add from a link or text</span>
          <span className="c-ink40 sm">{showAi?'Hide':'Show'}</span>
        </button>
        {showAi&&(
          <div className="mt3 space3">
            <p className="sm c-ink70">Paste any recipe link, or paste the recipe text — Claude will read it and fill in the form.</p>
            <div className="flex gap2">
              <input className={inp} value={aiInput} onChange={e=>setAiInput(e.target.value)} placeholder="https://... or recipe text" onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();handleAiImport();}}}/>
              <button onClick={handleAiImport} disabled={aiLoading||!aiInput.trim()} className="btn-rust px4 py2 sm" style={{flexShrink:0,borderRadius:'.5rem'}}>{aiLoading?'Reading…':'Fetch'}</button>
            </div>
            {aiError&&<p className="xs c-rust">{aiError}</p>}
            {aiNote&&<p className="xs c-sage">{aiNote}</p>}
          </div>
        )}
      </section>

      <div className="space4 mb8">
        <div><label className="block xs fw6 c-ink60 mb1 upper track">Title</label><input className={inp} value={draft.title} onChange={e=>upField('title',e.target.value)} placeholder="e.g. Grandma's Dal"/></div>
        <div><label className="block xs fw6 c-ink60 mb1 upper track">Description</label><textarea className={inp} rows={2} value={draft.description} onChange={e=>upField('description',e.target.value)} placeholder="A short note about this dish" style={{resize:'vertical'}}/></div>
        <div className="flex gap4">
          <div style={{flex:1}}><label className="block xs fw6 c-ink60 mb1 upper track">Base servings</label><input type="number" min={1} className={inp} value={draft.baseServings} onChange={e=>upField('baseServings',e.target.value)}/></div>
          <div style={{flex:1}}><label className="block xs fw6 c-ink60 mb1 upper track">Tags (comma separated)</label><input className={inp} value={tagsInput} onChange={e=>handleTagsChange(e.target.value)} placeholder="Beginner, 30 min"/></div>
        </div>
      </div>

      <section className="mb8">
        <h2 className="fd lg fw6 c-plum mb3">Ingredients</h2>
        <div className="space2">
          {draft.ingredients.map(ing=>(
            <div key={ing.id} className="flex gap2 items-start">
              <input type="number" step="0.25" className={inp} value={ing.amount} onChange={e=>upIng(ing.id,'amount',Number(e.target.value))} placeholder="1" style={{width:'5rem',flexShrink:0}}/>
              <input className={inp} value={ing.unit} onChange={e=>upIng(ing.id,'unit',e.target.value)} placeholder="cup" style={{width:'5rem',flexShrink:0}}/>
              <input className={`${inp} flex1`} value={ing.name} onChange={e=>upIng(ing.id,'name',e.target.value)} placeholder="Ingredient name"/>
              <button onClick={()=>remIng(ing.id)} className="w9 h9 rounded-full flex items-center justify-center c-rust bg-rust10" style={{flexShrink:0}}>×</button>
            </div>
          ))}
        </div>
        <button onClick={addIng} className="mt3 sm c-sage fw5">+ Add ingredient</button>
      </section>

      <section className="mb8">
        <h2 className="fd lg fw6 c-plum mb3">Steps</h2>
        <div className="space4">
          {draft.steps.map((s,i)=>(
            <div key={s.id} className="bg-white rounded-xl p3 border space2">
              <div className="flex items-center justify-between">
                <span className="fm xs fw7 c-sage">Step {i+1}</span>
                <button onClick={()=>remStep(s.id)} className="c-rust xs">×</button>
              </div>
              <input className={inp} value={s.title} onChange={e=>upStep(s.id,'title',e.target.value)} placeholder="Step title"/>
              <textarea className={inp} rows={2} value={s.content} onChange={e=>upStep(s.id,'content',e.target.value)} placeholder="What to do" style={{resize:'vertical'}}/>
              <textarea className={inp} rows={2} value={s.why} onChange={e=>upStep(s.id,'why',e.target.value)} placeholder="Why this matters (optional)" style={{resize:'vertical'}}/>
              <div>
                <label className="block xs fw6 c-ink60 mb1 upper track">Timer (minutes, optional)</label>
                <input type="number" min={0} className={inp} value={s.timerSeconds?Math.round(s.timerSeconds/60):''} onChange={e=>upStep(s.id,'timerSeconds',e.target.value?Number(e.target.value)*60:null)} placeholder="—" style={{width:'6rem'}}/>
              </div>
            </div>
          ))}
        </div>
        <button onClick={addStep} className="mt3 sm c-sage fw5">+ Add step</button>
      </section>

      <div className="fixed bottom0 left0 right0 bg-parchment border-top px5 py4 flex gap3 max2xl mxauto">
        <button onClick={onCancel} className="flex1 py3 rounded-full border c-ink70 fw5">Cancel</button>
        <button onClick={handleSave} className="flex1 btn-rust py3">Save recipe</button>
      </div>
    </div>
  );
}

// ---- App ----
function App(){
  const [recipes,setRecipes]=useState(()=>initRecipes());
  const [view,setView]=useState('library');
  const [activeId,setActiveId]=useState(null);
  const [showExport,setShowExport]=useState(false);
  const active=recipes.find(r=>r.id===activeId);

  const persist=next=>{setRecipes(next);saveRecipes(next);};

  const handleSave=recipe=>{
    const edited={...recipe,userEdited:true};
    const exists=recipes.some(r=>r.id===recipe.id);
    persist(exists?recipes.map(r=>r.id===recipe.id?edited:r):[...recipes,edited]);
    setActiveId(recipe.id);setView('detail');
  };

  const handleDelete=id=>{persist(recipes.filter(r=>r.id!==id));setActiveId(null);setView('library');};

  const handleImport=data=>{
    const ids=new Set(recipes.map(r=>r.id));
    const incoming=data.map(r=>({...r,id:ids.has(r.id)?newId('r'):r.id}));
    persist([...recipes,...incoming]);
  };

  const handleExport=()=>setShowExport(true);

  return(
    <div className="minscreen bg-parchment c-ink">
      {view==='library'&&<Library recipes={recipes} onOpen={id=>{setActiveId(id);setView('detail');}} onAdd={()=>{setActiveId(null);setView('edit');}} onExport={handleExport} onImport={handleImport}/>}
      {view==='detail'&&active&&<RecipeDetail recipe={active} onBack={()=>setView('library')} onEdit={id=>{setActiveId(id);setView('edit');}} onDelete={handleDelete} onCook={id=>{setActiveId(id);setView('cook');}}/>}
      {view==='edit'&&<RecipeForm initial={active} onSave={handleSave} onCancel={()=>setView(active?'detail':'library')}/>}
      {view==='cook'&&active&&<CookMode recipe={active} onExit={()=>setView('detail')}/>}

      {showExport&&(
        <div className="fixed inset0 flex items-center justify-center" style={{background:'rgba(74,46,58,.6)',zIndex:50,padding:'1.25rem'}}>
          <div className="bg-parchment rounded-2xl p5 wfull flex flex-col" style={{maxWidth:'32rem',maxHeight:'80vh'}}>
            <div className="flex items-center justify-between mb3">
              <h2 className="fd lg fw6 c-plum">Export your recipes</h2>
              <button onClick={()=>setShowExport(false)} className="c-ink50 xl" style={{lineHeight:1}}>×</button>
            </div>
            <p className="sm c-ink70 mb3">Tap inside the box, select all (Ctrl/Cmd+A), copy (Ctrl/Cmd+C), then paste into the "Paste recipes" box in your other app.</p>
            <textarea readOnly value={JSON.stringify(recipes,null,2)} className="input-base flex1 fm xs" style={{minHeight:200}} onFocus={e=>e.target.select()}/>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
